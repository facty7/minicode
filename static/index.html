<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MiniCode</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="mark">M</div>
          <div>
            <h1>MiniCode</h1>
            <p id="workspaceLabel">workspace</p>
          </div>
        </div>

        <button id="newSessionBtn" class="new-chat">新建对话</button>

        <section>
          <div class="section-title">
            <span>对话</span>
            <button id="refreshBtn" title="刷新">刷新</button>
          </div>
          <div id="sessionList" class="session-list"></div>
        </section>

        <section class="workspace-card">
          <div class="section-title">
            <span>工作区</span>
            <span id="indexStatus">index --</span>
          </div>
          <div class="workspace-row">
            <span>模型</span>
            <strong id="modelStatus">offline</strong>
          </div>
          <div class="workspace-row">
            <span>命令</span>
            <strong id="shellStatus">confirm-only</strong>
          </div>
          <button id="settingsBtn" class="ghost">项目设置</button>
        </section>
      </aside>

      <section class="chat-pane">
        <header class="chat-header">
          <div>
            <h2>MiniCode 助手</h2>
            <p>在当前仓库里提问、修改文件或运行检查。需要写入和命令执行时会先确认。</p>
          </div>
          <label class="confirm-toggle">
            <input type="checkbox" id="confirmRisky" />
            <span>允许本次写入 / 命令</span>
          </label>
        </header>

        <div id="chatLog" class="chat-log"></div>

        <form id="chatForm" class="composer">
          <textarea id="chatInput" rows="4" placeholder="例如：帮我看看这个项目的入口文件和主要模块；或者：把 README 里的标题改得更清楚，先给我 diff。"></textarea>
          <div class="composer-actions">
            <div class="quick-actions">
              <button type="button" data-prompt="先浏览这个仓库的目录和主要文件，然后总结项目结构。">看项目结构</button>
              <button type="button" data-prompt="搜索代码里和工具调用、风险确认、patch 相关的实现，并解释流程。">查 Agent 流程</button>
              <button type="button" data-prompt="运行 python -m py_compile app.py 检查语法。">运行检查</button>
            </div>
            <button type="submit" class="send-btn">发送</button>
          </div>
        </form>
      </section>

      <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
        <div class="settings-head">
          <div>
            <h2>项目设置</h2>
            <p>这些是后台工具状态，不需要一直打扰主聊天。</p>
          </div>
          <button id="closeSettingsBtn" class="icon-btn" title="关闭">x</button>
        </div>

        <section>
          <div class="section-title">
            <span>文件地图</span>
            <button id="repoMapBtn">刷新</button>
          </div>
          <pre id="repoMapView" class="code-box"></pre>
        </section>

        <section>
          <div class="section-title">
            <span>最近执行</span>
            <button id="reindexBtn">重建索引</button>
          </div>
          <div id="activityList" class="activity-list"></div>
        </section>

        <section>
          <div class="section-title"><span>输出</span><span id="outputKind">json</span></div>
          <pre id="toolOutput" class="code-box small"></pre>
        </section>
      </aside>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
